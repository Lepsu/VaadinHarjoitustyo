# ========================
# H2 Tietokanta
# ========================
spring.datasource.url=jdbc:h2:file:./data/eventdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ========================
# Spring Auditing
# ========================
spring.jpa.properties.hibernate.envers.audit_table_suffix=_HISTORY
spring.jpa.properties.hibernate.envers.store_data_at_delete=true

# ========================
# Email (Mailtrap testitunnus - vaihda omiin)
# ========================
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=MAILTRAP_USERNAME
spring.mail.password=MAILTRAP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

